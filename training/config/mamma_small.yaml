defaults:
  - default_dataset_smpl.yaml

# torchrun --standalone --nproc_per_node=1 launch.py --config mamma_small
exp_name: mamma_small
img_size: 518
num_workers: 0            # real training: prefetch across workers
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 5         # validate on the test split every few epochs
max_img_per_gpu: 40        # 4 views per sample (seqs have 8; we sample 4)

# Full Mamma_mv_split: 34 train seqs / 6 test seqs (all 2-person, 8 views each).
# limit_*_batches: null -> iterate the whole split each epoch. Set an int to cap.
limit_train_batches: null
limit_val_batches: null


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      # real training: enable augmentation + random view sampling.
      rescale_aug: True
      fixed_view_sampling: False   # sample 4 of the 8 views at random
      inside_random: True
      augs:
        scales: null
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: training.data.datasets.sys_smpl_multi.SysSMPLMultiDataset
          split: train
          # Point at the split root; rglob("png") finds every seq under it.
          # SysSMPL_DIR: /mnt/train-data-4-hdd/yian/Mamma_mv_split/train
          # SysSMPL_ANNOTATION_DIR: /mnt/train-data-4-hdd/yian/Mamma_mv_split/train
          SysSMPL_DIR: /dataset/Mamma_mv_split/train
          SysSMPL_ANNOTATION_DIR: /dataset/Mamma_mv_split/train
          max_num_people: 2   # every seq in this scene has 2 people
          min_num_images: 4   # need >= 4 views per sample
          emit_landmarks: True
          emit_person_mask: True
          emit_contact: True
          contact_threshold: 0.01
          # missing-sdf frames are genuinely non-contact (verified) -> supervise as negatives (MAMMA).
          contact_missing_as_negative: True
          # null -> use ALL sequences and ALL frames (cold-read is slow on the
          # first build; warm cache is fast). Set an int to bound for quick debug.
          max_sequences: null
          max_frames_per_sequence: null
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      # deterministic eval: no aug, fixed (first-4) views.
      rescale_aug: False
      fixed_view_sampling: True
      inside_random: False
      augs:
        scales: null
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: training.data.datasets.sys_smpl_multi.SysSMPLMultiDataset
          split: test
          # SysSMPL_DIR: /mnt/train-data-4-hdd/yian/Mamma_mv_split/test
          # SysSMPL_ANNOTATION_DIR: /mnt/train-data-4-hdd/yian/Mamma_mv_split/test
          SysSMPL_DIR: /dataset/Mamma_mv_split/test
          SysSMPL_ANNOTATION_DIR: /dataset/Mamma_mv_split/test
          max_num_people: 2
          min_num_images: 4
          emit_landmarks: True
          emit_person_mask: True
          emit_contact: True
          contact_threshold: 0.01
          # missing-sdf frames are genuinely non-contact (verified) -> supervise as negatives (MAMMA).
          contact_missing_as_negative: True
          max_sequences: null
          max_frames_per_sequence: null


logging:
  log_dir: logs/${exp_name}
  use_wandb: True   # trial: no wandb login/network
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  wandb_writer:
    _target_: train_utils.wandb_logger.WandbLogger
    path: ${logging.log_dir}/wandb
    project: vggt_multi
    entity: null
    name: ${exp_name}
    mode: online
    resume: null
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_smpl
        - loss_smpl_losses
        - loss_mesh_translate
        - loss_smpl_presence
        - loss_smpl_joints2d
        - loss_smpl_joints3d
        - loss_smpl_vertices
        - loss_landmark
        - loss_landmark_vis
        - landmark_px
        - loss_mask
        - mask_soft_iou
        - smpl_presence_positive_prob_mean
        - smpl_presence_empty_prob_mean
        - loss_contact
        - loss_floor_contact
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_smpl
        - loss_smpl_losses
        - loss_mesh_translate
        - loss_smpl_presence
        - loss_smpl_joints2d
        - loss_smpl_joints3d
        - loss_smpl_vertices
        - loss_landmark
        - loss_landmark_vis
        - landmark_px
        - loss_mask
        - mask_soft_iou
        - smpl_presence_positive_prob_mean
        - smpl_presence_empty_prob_mean
        - loss_contact
        - loss_floor_contact



checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5           # save every few epochs
  save_step_freq: null   # epoch-based saving for real training
  # Load the pretrained aggregator from the local base ckpt (heads incl.
  # landmark/mask are random-init and not in the ckpt). Set to null to skip.
  # resume_checkpoint_path: "/mnt/train-data-4-hdd/yian/vggt_multi_0621_mamma_demo_eval_bundle/ckpt/model.pt"
  resume_checkpoint_path: "/dataset/vggt/model.pt"
  strict: False
  load_aggregator_only: False


loss:
  _target_: loss.MultitaskLoss
  # SMPL-X model.pkl base dir (use_mamma=True). Expects
  # <dir>/{female,male,neutral}/model.pkl. Comment out / set null to use the
  # bundled smplx_models/ under the repo root.
  # smplx_model_dir: /mnt/train-data-4-hdd/yian/vggt_multi_0621_mamma_demo_eval_bundle/smplx_models
  smplx_model_dir: /dataset/smplx_models
  camera:
    weight: 5.0
    loss_type: "l1"
  depth: null
  smpl:
    weight: 1.0
    loss_type: l1
    loss_type_joints2d: l1
    loss_type_joints3d: l1

    weight_pose: 1.0
    weight_beta: 0.001
    init_w: 1.0
    weight_joints2d: 5.0
    weight_joints3d: 5.0
    weight_vertices: 1.5
    weight_trans: 0.0
    weight_mesh_translate: 1.0
    weight_presence: 0.5
    presence_loss_type: focal
    presence_focal_alpha: null
    presence_focal_gamma: 2.0

    # Dense-landmark (direct 2D GNLL) + per-person mask (BCE). Computed inside
    # compute_smpl_loss so they share the Hungarian matching + people-flatten.
    weight_landmark: 1.0
    weight_landmark_vis: 0.1
    landmark_loss_type: gnll   # gnll (predicts per-point logvar) | l2
    # "visibility" (repo, 0/1 gate by occlusion x in-frame) | "mamma" (in-frame=1 +
    # out-of-frame soft decay + hands/feet boost, occlusion NOT gated).
    landmark_weight_mode: visibility
    landmark_mamma_beta: 2.0
    landmark_mamma_hand_weight: 1.0
    weight_contact: 0.1
    weight_floor_contact: 0.1
    contact_focal_alpha: 0.9
    contact_focal_gamma: 2.0
    weight_mask: 1.0

    use_gt: True
    normalize_cam: True
    # When True, decode predicted/GT 3D joints + vertices with the SMPL-X NPZ
    # models in smplx_models/ (torch port of Scripts/process_mamma_syn.py), so the
    # supervision matches MAMMA ground truth (joints 22<-20, 23<-21).
    use_mamma: True
    use_hungarian: True
    hungarian_cost_pose_weight: 1.0
    hungarian_cost_beta_weight: 0.1
    hungarian_cost_trans_weight: 0.0
    hungarian_cost_mesh_trans_weight: 0.3
    hungarian_cost_presence_weight: 0.05
  track: null




optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
    weight_decay: 0.01   # real training: light regularisation

  frozen_module_names:
      - "*aggregator*"

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["smpl"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["person_mask_head"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: ${optim.optimizer.lr}
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: ${optim.optimizer.lr}
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.01


max_epochs: 100   # real (small) training on the full Mamma_mv_split

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: False
  enable_point: False
  enable_track: False
  enable_smpl: False
  enable_smpl_multi_query: False
  enable_smpl_multi_query_trans: False
  enable_smpl_multi_query_trans_rot: True
  # Number of person query slots (SMPL tokens). Must be >= the max people per
  # scene (see data.*.max_num_people). Fewer slots -> much less memory in the
  # dense-landmark head (cost scales with smpl_num_people * 512 queries).
  smpl_num_people: 6   # every seq in this scene has 2 people
  # Auxiliary heads that reuse the SMPL person tokens (identity-disentangling).
  enable_smpl_dense_landmark: True   # direct per-view 512 2D landmarks + logvar
  enable_person_mask: True           # per-person per-view patch-grid mask
  # MAMMA-style spatial prompt for the dense landmark head. The landmark decoder
  # sees each person mask as an additive context embedding over patch tokens.
  landmark_use_mask_embedding: True
  landmark_mask_embed_dim: 256
  landmark_detach_mask_context: True
  landmark_predict_contact: True

distributed:
  # check https://docs.pytorch.org/docs/stable/generated/torch.nn.parallel.DistributedDataParallel.html for options
  backend: nccl
  comms_dtype: None
  find_unused_parameters: True
  timeout_mins: 30
  gradient_as_bucket_view: True  # Less memory used
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
    cudnn_deterministic: False
    cudnn_benchmark: False
    allow_tf32: True
