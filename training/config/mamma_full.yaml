defaults:
  - default_dataset_smpl.yaml

# export CUDA_VISIBLE_DEVICES=2          
# export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
# export PYTHONPATH=/mnt/train-data-4-hdd/yian/vggt_multi_0621_mamma_demo_eval_bundle:/mnt/train-data-4-hdd/yian/vggt_multi_0621_mamma_demo_eval_bundle/training
# torchrun --standalone --nproc_per_node=1 launch.py --config mamma_full

exp_name: mamma_full

#* FAST pipeline test:
#*   debug_max_sequences: 3
#*   debug_max_frames_per_sequence: 2
#*   limit_train_batches: 20        # (below) also cap steps/epoch
#* REAL run: set the two train knobs back to null and limit_train_batches: null.
#* TRAIN caps (null = full data). These MUST stay defined (uncommented) because
#* the dataset configs below reference them via ${debug_*}. For a FAST smoke test
#* set them to small ints (e.g. 3 / 2 / 30 / 5) + limit_train_batches: 20.
debug_max_sequences: null
debug_max_frames_per_sequence: null
debug_val_max_sequences: null
debug_val_max_frames_per_sequence: null
# ----------------------------------------------------------------------------

img_size: 518
num_workers: 0            # 0 = load in the main process (original behaviour)
seed_value: 42
accum_steps: 1            # raise for a larger effective batch (grad accumulation)
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 4        # 4 views/sample -> batch_size = floor(4/4) = 1 sample/step

# Full epoch = one pass over all samples (~50,648 steps on 1 GPU, /world_size on N).
# Set to an int to cap steps/epoch (as the overfit config did with 1000).
limit_train_batches: null
limit_val_batches: 10


data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      training: True
      # 4 views per sample, RANDOMLY chosen from the timestep's available views.
      img_nums: [4, 4]            # fixed view-count = 4 (batch_size = 4/4 = 1)
      fixed_view_sampling: False  # random 4 views (True = deterministic first-4)
      inside_random: False        # let the DistributedSampler pick which sample
      rescale_aug: False
      augs:
        # aspect ratio per step. [1.0, 1.0] = always square 518x518 (matches the
        # eval/demo input; cleanest). Widen to e.g. [0.33, 1.0] for aspect aug.
        aspects: [1.0, 1.0]
        # random zoom/crop aug (only in training). null = off; [0.8, 1.0] to enable.
        scales: null
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: training.data.datasets.sys_smpl_multi.SysSMPLMultiDataset
          split: train
          SysSMPL_DIR: /dataset/mamma
          SysSMPL_ANNOTATION_DIR: /dataset/mamma
          max_num_people: 6   # dataset smpl query 數量
          min_num_images: 4
          emit_landmarks: True
          emit_person_mask: True
          emit_contact: True
          contact_threshold: 0.01
          contact_missing_as_negative: True # 沒接觸的點會學習
          # smoke-test caps (null = full data). Toggle via debug_max_* at top of file.
          max_sequences: ${debug_max_sequences}
          max_frames_per_sequence: ${debug_max_frames_per_sequence}
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      training: False
      img_nums: [4, 4]
      fixed_view_sampling: True   # deterministic views for a stable val signal
      inside_random: False
      augs:
        aspects: [1.0, 1.0]
        scales: null
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: training.data.datasets.sys_smpl_multi.SysSMPLMultiDataset
          split: test
          SysSMPL_DIR: /dataset/mamma
          SysSMPL_ANNOTATION_DIR: /dataset/mamma
          max_num_people: 6
          min_num_images: 4
          emit_landmarks: True
          emit_person_mask: True
          emit_contact: True
          contact_threshold: 0.01
          contact_missing_as_negative: True
          # val caps (independent debug switch at top of file).
          max_sequences: ${debug_val_max_sequences}
          max_frames_per_sequence: ${debug_val_max_frames_per_sequence}


logging:
  log_dir: logs/${exp_name}
  use_wandb: True
  log_visuals: False
  log_freq: 50
  log_level_primary: INFO
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  wandb_writer:
    _target_: train_utils.wandb_logger.WandbLogger
    path: ${logging.log_dir}/wandb
    project: vggt_multi
    entity: null
    name: ${exp_name}
    mode: online
    resume: null
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_smpl
        - loss_smpl_losses
        - loss_mesh_translate
        - loss_smpl_presence
        - loss_smpl_joints2d
        - loss_smpl_joints3d
        - loss_smpl_vertices
        - loss_landmark
        - loss_landmark_vis
        - landmark_px
        - loss_mask
        - mask_soft_iou
        - smpl_presence_positive_prob_mean
        - loss_contact
        - loss_floor_contact
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_smpl
        - loss_smpl_losses
        - loss_mesh_translate
        - loss_smpl_presence
        - loss_smpl_joints2d
        - loss_smpl_joints3d
        - loss_smpl_vertices
        - loss_landmark
        - loss_landmark_vis
        - landmark_px
        - loss_mask
        - mask_soft_iou
        - smpl_presence_positive_prob_mean
        - loss_contact
        - loss_floor_contact


checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 1              # epochs (a full epoch is huge; step_freq is the real knob)
  save_step_freq: 5000      # checkpoint every 2000 optimizer steps
  resume_checkpoint_path: "/dataset/vggt/model.pt"
  strict: False
  load_aggregator_only: False


loss:
  _target_: loss.MultitaskLoss
  smplx_model_dir: /dataset/smplx_models
  camera:
    weight: 5.0
    loss_type: "l1"
  depth: null
  smpl:
    weight: 1.0
    loss_type: l1
    loss_type_joints2d: l1
    loss_type_joints3d: l1

    weight_pose: 1.0
    weight_beta: 0.001
    init_w: 1.0
    weight_joints2d: 5.0
    weight_joints3d: 5.0
    weight_vertices: 1.5
    weight_trans: 0.0
    weight_mesh_translate: 1.0
    weight_presence: 0.5
    presence_loss_type: focal
    presence_focal_alpha: null
    presence_focal_gamma: 2.0

    weight_landmark: 1.0
    weight_landmark_vis: 0.1
    landmark_loss_type: gnll

    #* Landmark coord-loss weighting:
    #*   "visibility" (repo default) -> hard 0/1 gate by occlusion x in-frame
    #*   "mamma"      -> MAMMA BEDLAM_WD weights: in-frame=1, out-of-frame soft decay
    landmark_weight_mode: mamma
    landmark_mamma_beta: 2.0
    landmark_mamma_hand_weight: 1.0

    #* MAMMA-style per-landmark contact losses (sigmoid focal). Needs the dense
    #* landmark head with model.landmark_predict_contact=True and dataset emit_contact=True.
    #* Set weights to 0 to disable.
    weight_contact: 0.1          # person-person contact (sdf_vertices < thresh, occluded)
    weight_floor_contact: 0.1    # floor contact (floor_contact_mask)
    contact_focal_alpha: 0.9
    contact_focal_gamma: 2.0
    weight_mask: 1.0

    # use_gt: True 會把 pred pose/beta/trans/mesh_translate 全換成 GT(sanity 模式,
    # joints3d/vertices/mesh_translate/joints2d 都會變 ~0)。正式訓練用 False。
    use_gt: False   # 驗證 gt data loss 有沒有問題而已
    joints2d_use_gt_camera: True
    normalize_cam: True
    use_mamma: True
    use_hungarian: True
    hungarian_cost_pose_weight: 1.0
    hungarian_cost_beta_weight: 0.1
    hungarian_cost_trans_weight: 0.0
    hungarian_cost_mesh_trans_weight: 0.3
    hungarian_cost_presence_weight: 0.05
  track: null


optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
    weight_decay: 0.0        # real run: consider a small wd (e.g. 0.01)

  # Aggregator stays frozen (only the heads train), matching the overfit setup.
  # To also fine-tune the backbone, remove "*aggregator*" here (much more memory,
  # and drop the aggregator entry under gradient_clip accordingly / keep it).
  frozen_module_names:
      - "*aggregator*"

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["smpl"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["person_mask_head"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: ${optim.optimizer.lr}
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: ${optim.optimizer.lr}
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.0


max_epochs: 50   # ~50k steps/epoch on 1 GPU; stop early via checkpoints as needed

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: False
  enable_point: False
  enable_track: False
  enable_smpl: False
  enable_smpl_multi_query: False
  enable_smpl_multi_query_trans: False
  enable_smpl_multi_query_trans_rot: True
  smpl_num_people: 6   # smpl query
  enable_smpl_dense_landmark: True
  enable_person_mask: True
  landmark_use_mask_embedding: True
  landmark_mask_embed_dim: 256
  landmark_detach_mask_context: True
  landmark_predict_contact: True

distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: True
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
    cudnn_deterministic: False
    cudnn_benchmark: False
    allow_tf32: True
